<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pendente - Rei dos Bots</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pending-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            padding: 20px;
        }
        .pending-box {
            background: rgba(255, 193, 7, 0.1);
            border: 2px solid #ffc107;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
        }
        .pending-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .pending-title {
            color: #ffc107;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .pending-text {
            color: #b0b0b0;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00cc33, #00aa2b);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 204, 51, 0.4);
        }
    </style>
</head>
<body>
    <div class="pending-container">
        <div class="pending-box">
            <div class="pending-icon">⏳</div>
            <h1 class="pending-title">Pagamento Pendente</h1>
            <p class="pending-text">
                Seu pagamento está sendo processado.<br>
                Você receberá um e-mail assim que for confirmado.<br><br>
                Isso pode levar alguns minutos.<br><br>
                Dúvidas? WhatsApp: <strong>(55) 99934-4071</strong>
            </p>
            <a href="index.html" class="btn-home">Voltar para o Início</a>
        </div>
    </div>
</body>
</html>
