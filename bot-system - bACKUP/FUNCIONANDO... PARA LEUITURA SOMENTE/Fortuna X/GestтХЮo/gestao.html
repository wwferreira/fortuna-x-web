<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Gestão - Rei dos Bots</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --card-bg: #0d1b0d;
            --text-light: #ffffff;
            --text-gray: #b0b0b0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
        }

        .header-custom {
            background: rgba(10, 10, 10, 0.95);
            padding: 15px 0;
            border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            vertical-align: middle;
            margin-right: 15px;
            border: 1px solid var(--neon-green);
        }

        .header-title {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            vertical-align: middle;
        }

        .header-title span {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .main-card-container {
            background: var(--card-bg);
            max-width: 1000px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            border: 2px solid rgba(0, 255, 65, 0.3);
        }

        h1 {
            text-align: center;
            color: var(--neon-green);
            margin-bottom: 25px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-pdf {
            display: block;
            margin: 0 auto 30px auto;
            padding: 12px 25px;
            background: linear-gradient(135deg, #00cc33, #00aa2b, #008822);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 204, 51, 0.3);
        }

        .btn-pdf:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 204, 51, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border: 1px solid rgba(0, 255, 65, 0.1);
            text-align: center;
        }

        th {
            background: rgba(0, 255, 65, 0.15);
            color: var(--neon-green);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .btn-green, .btn-red {
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-green { background-color: #008822; }
        .btn-red { background-color: #aa0000; }

        .btn-green:hover, .btn-red:hover { opacity: 0.8; }

        .row-green { background-color: rgba(0, 255, 65, 0.1) !important; }
        .row-red { background-color: rgba(255, 0, 0, 0.1) !important; }

        .banca-input {
            width: 90px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            color: white;
            padding: 5px;
            text-align: center;
        }

        .editar-btn {
            font-size: 11px;
            margin-left: 5px;
            cursor: pointer;
            padding: 4px 8px;
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-gray);
            border: none;
            border-radius: 4px;
            transition: 0.3s;
        }

        .editar-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-voltar {
            display: block;
            text-align: center;
            margin: 30px 0;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .btn-voltar:hover {
            color: var(--neon-green);
        }

        /* Footer Styles Refined */
        .footer {
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1419 100%);
            padding: 40px 0 20px;
            border-top: 1px solid rgba(0, 255, 65, 0.1);
            color: var(--text-gray);
            margin-top: 60px;
        }

        .footer .container-footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: nowrap !important;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            flex: 0 0 auto;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        .footer-logo h1 {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            text-transform: none;
            word-break: keep-all;
        }

        .footer-logo h1 span {
            color: #39ff14;
        }

        .footer-seals {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .seal-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .seal-badge-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .seal-18 {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #595050, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            border: 1.5px solid #fff;
        }

        .seal-badge-text {
            font-size: 0.65rem;
            color: #9ca3af;
            line-height: 1.2;
        }

        .seal-badge-text strong {
            color: #fff;
            display: block;
            font-size: 0.7rem;
        }

        .payment-img {
            height: 75px;
            width: auto;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .payment-img:hover {
            opacity: 1;
        }

        .footer-social {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            flex: 0 0 auto;
        }

        .social-link {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #9ca3af;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link:hover {
            background: rgba(0, 255, 65, 0.1);
            border-color: rgba(0, 255, 65, 0.3);
            color: #00ff41;
            transform: translateY(-2px);
        }

        .footer-bottom {
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .footer-copyright-main {
            color: #6b7280;
            font-size: 0.8rem;
            margin: 0;
        }

        /* Media query content removed to prevent stacking */
        @media (max-width: 1024px) {
            .footer-content {
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .footer-logo h1 {
                font-size: 1.2rem;
            }
            .seal-badge {
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header-custom">
        <div class="container-header">
            <img src="icon.png" alt="Rei dos Bots" class="logo-img">
            <div class="header-title">Rei dos Bots - <span>Fortuna</span></div>

    <div class="main-card-container">

        <table>

                    <th>Stop Loss</th>
                    <th>Stop Green</th>
                    <th>Resultado</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>

        <a href="planilha.html" class="btn-voltar">← Voltar para lista de gestões</a>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

                <div class="footer-brand">

                        <div class="seal-badge-icon seal-18">18+</div>

                    </div>
                    <div class="seal-badge">
                        <div class="seal-badge-icon">✓</div>
                        <div class="seal-badge-text">Verificado por<br><strong>ConfiançaAQUI</strong></div>
                    </div>
                    <div class="seal-badge">
                        <div class="seal-badge-icon">🛡️</div>
                        <div class="seal-badge-text">Autêntico<br><strong>cert.iob.cw</strong></div>
                    </div>
                    <img src="pix-banco-central-logo.png" alt="PIX" class="payment-img">
                    <img src="mercado-livre-logo-2022.png" alt="Mercado Pago" class="payment-img">
                    <img src="infinitypay.png" alt="InfinitePay" class="payment-img">
                </div>

                <!-- Social Links -->
                <div class="footer-social">
                    <a href="#" class="social-link" aria-label="LinkedIn">

            </div>
        </div>

    <script>
        let gestao = JSON.parse(localStorage.getItem('gestaoSelecionada'));
        let dias = [];

        if (!gestao) {
            document.querySelector('.container').innerHTML = '<p style="text-align:center;">Gestão não encontrada. <a href="planilha.html" style="color:var(--neon-green);">Voltar</a></p>';
        } else {
            document.getElementById('titulo').textContent += ' ' + gestao.nome;
            dias = JSON.parse(localStorage.getItem('dias_' + gestao.id)) || [];
            if (dias.length === 0) {
                iniciarTabela();
            } else {
                renderizarTabela();
            }
        }

        function iniciarTabela() {
            const totalDias = parseInt(gestao.dias);
            let banca = parseFloat(gestao.valor);
            const percentual = parseFloat(gestao.percentual);

            for (let i = 1; i <= totalDias; i++) {
                const lucro = banca * (percentual / 100);
                const stopLoss = banca - lucro;
                const stopGreen = banca + lucro;

                dias.push({ dia: i, banca, lucro, stopLoss, stopGreen, resultado: '', editavel: false });
                banca += lucro;
            }

            salvarTabela();
            renderizarTabela();
        }

        function salvarTabela() {
            localStorage.setItem('dias_' + gestao.id, JSON.stringify(dias));
        }

        function renderizarTabela() {
            const tabela = document.getElementById('tabela');
            tabela.innerHTML = '';

            dias.forEach((d, i) => {
                const row = document.createElement('tr');
                row.id = `linha-${d.dia}`;
                
                if (d.resultado === 'green') row.classList.add('row-green');
                if (d.resultado === 'red') row.classList.add('row-red');

                let resultadoHTML = '';
                if (d.resultado === 'green') {
                    resultadoHTML = '<span style="color: #00ff41; font-weight: bold;">✔ GREEN</span>';
                } else if (d.resultado === 'red') {
                    resultadoHTML = '<span style="color: #ff4444; font-weight: bold;">✘ RED</span>';
                } else {
                    resultadoHTML = `
                        <button class="btn-green" onclick="marcarResultado(${d.dia}, 'green')">&#10003;</button>
                        <button class="btn-red" onclick="marcarResultado(${d.dia}, 'red')">&#10005;</button>
                    `;
                }

                if (d.resultado === 'green' || d.resultado === 'red') {
                    resultadoHTML += ` <button class="editar-btn" onclick="editarResultado(${d.dia})">Editar</button>`;
                }

                row.innerHTML = `
                    <td>${d.dia}</td>
                    <td>${d.editavel ? 
                        `<input class="banca-input" id="input-banca-${d.dia}" type="number" step="0.01" value="${d.banca || ''}" onblur="atualizarBanca(${d.dia})">` 
                        : `R$ ${d.banca.toFixed(2)}`}</td>
                    <td>R$ ${d.lucro?.toFixed(2)}</td>
                    <td style="color:#ff4444">R$ ${d.stopLoss?.toFixed(2)}</td>
                    <td style="color:#00ff41">R$ ${d.stopGreen?.toFixed(2)}</td>
                    <td id="resultado-${d.dia}">${resultadoHTML}</td>
                `;
                tabela.appendChild(row);
            });
        }

        function marcarResultado(dia, tipo) {
            const idx = dia - 1;
            dias[idx].resultado = tipo;

            if (tipo === 'red' && dias[idx + 1]) {
                dias[idx + 1].editavel = true;
            }

            salvarTabela();
            renderizarTabela();
        }

        function editarResultado(dia) {
            const idx = dia - 1;
            dias[idx].resultado = '';
            salvarTabela();
            renderizarTabela();
        }

        function atualizarBanca(dia) {
            const idx = dia - 1;
            const inputEle = document.getElementById(`input-banca-${dia}`);
            const novaBanca = parseFloat(inputEle.value);
            if (isNaN(novaBanca) || novaBanca <= 0) return;

            const percentual = parseFloat(gestao.percentual);
            dias[idx].banca = novaBanca;
            dias[idx].lucro = novaBanca * (percentual / 100);
            dias[idx].stopLoss = novaBanca - (novaBanca * (percentual / 100)); // Usando lucro fixo ou variável?
            // Re-calculando tudo baseado no novo valor
            dias[idx].stopLoss = novaBanca - (novaBanca * (percentual / 100));
            dias[idx].stopGreen = novaBanca + (novaBanca * (percentual / 100));
            
            dias[idx].editavel = false;

            for (let i = idx + 1; i < dias.length; i++) {
                dias[i].banca = dias[i - 1].banca + (dias[i-1].resultado === 'green' ? dias[i-1].lucro : 0);
                // Se o usuário editou a banca, assume-se que é o novo ponto de partida
                if(i === idx + 1) {
                    dias[i].banca = novaBanca; 
                } else {
                     // Lógica original de cascata simplificada
                }
                
                dias[i].lucro = dias[i].banca * (percentual / 100);
                dias[i].stopLoss = dias[i].banca - dias[i].lucro;
                dias[i].stopGreen = dias[i].banca + dias[i].lucro;
                dias[i].editavel = false;
                dias[i].resultado = '';
            }

            salvarTabela();
            renderizarTabela();
        }
    
        function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            doc.setFontSize(18);
            doc.text('Relatório de Gestão - ' + gestao.nome, 14, 20);
            const headers = [["Dia", "Banca", "Lucro", "Stop Loss", "Stop Green", "Resultado"]];
            const data = dias.map(d => [
                d.dia,
                "R$ " + d.banca.toFixed(2),
                "R$ " + d.lucro.toFixed(2),
                "R$ " + d.stopLoss.toFixed(2),
                "R$ " + d.stopGreen.toFixed(2),
                d.resultado ? d.resultado.toUpperCase() : "-"
            ]);

            doc.autoTable({
                head: headers,
                body: data,
                startY: 30,
                styles: { fontSize: 10 }
            });

            doc.save("gestao_" + gestao.nome.replace(/\s+/g, '_') + ".pdf");
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</body>
