<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rei dos Bots</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; width: 300px; min-height: 200px; }
  .container { padding: 20px; }
  .logo { text-align: center; margin-bottom: 20px; }
  .logo h2 { color: #a855f7; font-size: 16px; }
  .logo p { color: #666; font-size: 11px; margin-top: 3px; }
  input { width: 100%; padding: 10px 12px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 13px; margin-bottom: 10px; }
  input:focus { outline: none; border-color: #a855f7; }
  label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
  .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .msg { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 10px; display: none; }
  .msg-err { background: rgba(239,68,68,.15); border: 1px solid #ef4444; color: #ef4444; }
  .msg-ok { background: rgba(34,197,94,.15); border: 1px solid #22c55e; color: #22c55e; }
  .status-panel { display: none; }
  .status-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a2e; font-size: 12px; }
  .status-row:last-child { border-bottom: none; }
  .label-key { color: #888; }
  .label-val { color: #e0e0e0; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot-green { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
  .dot-red { background: #ef4444; }
  .dot-yellow { background: #f59e0b; }
  .btn-sair { background: transparent; border: 1px solid #444; color: #888; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100%; margin-top: 12px; }
  .btn-ir { background: linear-gradient(135deg, #22c55e, #16a34a); margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h2>🤖 Rei dos Bots</h2>
    <p>Roleta Brasileira — big.bet.br</p>
  </div>

  <!-- LOGIN DA CASA DE APOSTA -->
  <div id="loginPanel">
    <div class="msg msg-err" id="errMsg"></div>
    <label>Email da casa de aposta</label>
    <input type="email" id="emailCasa" placeholder="seu@email.com">
    <label>Senha da casa de aposta</label>
    <input type="password" id="senhaCasa" placeholder="••••••••">
    <button class="btn" id="btnEntrar">Entrar na Mesa</button>
  </div>

  <!-- STATUS DO BOT -->
  <div id="statusPanel" class="status-panel">
    <div class="msg msg-ok" id="msgOk"></div>
    <div class="status-row">
      <span class="label-key">Servidor</span>
      <span class="label-val"><span class="dot" id="dotServidor"></span><span id="txtServidor">—</span></span>
    </div>
    <div class="status-row">
      <span class="label-key">Estratégia</span>
      <span class="label-val" id="txtEstrategia">—</span>
    </div>
    <div class="status-row">
      <span class="label-key">Ficha</span>
      <span class="label-val" id="txtFicha">—</span>
    </div>
    <div class="status-row">
      <span class="label-key">Stop Win</span>
      <span class="label-val" id="txtStopWin">—</span>
    </div>
    <div class="status-row">
      <span class="label-key">Stop Loss</span>
      <span class="label-val" id="txtStopLoss">—</span>
    </div>
    <div class="status-row">
      <span class="label-key">Bot</span>
      <span class="label-val"><span class="dot" id="dotBot"></span><span id="txtBot">Aguardando</span></span>
    </div>
    <button class="btn btn-ir" id="btnIrMesa">🎰 Ir para a Mesa</button>
    <button class="btn-sair" id="btnSair">Sair</button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
