<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Aprovado - Rei dos Bots</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            padding: 20px;
        }
        .success-box {
            background: rgba(0, 204, 51, 0.1);
            border: 2px solid #00cc33;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .success-title {
            color: #00ff41;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .success-text {
            color: #b0b0b0;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00cc33, #00aa2b);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 204, 51, 0.4);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-box">
            <div class="success-icon">✅</div>
            <h1 class="success-title">Pagamento Aprovado!</h1>
            <p class="success-text">
                Seu pagamento foi aprovado com sucesso!<br>
                Em breve você receberá um e-mail com as instruções de acesso ao bot.<br><br>
                Caso tenha dúvidas, entre em contato pelo WhatsApp: <strong>(55) 99934-4071</strong>
            </p>
            <a href="index.html" class="btn-home">Voltar para o Início</a>
        </div>
    </div>
</body>
</html>
