<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Banca - Rei dos Bots</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --card-bg: #0d1b0d;
            --text-light: #ffffff;
            --text-gray: #b0b0b0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
        }

        .header-custom {
            background: rgba(10, 10, 10, 0.95);
            padding: 15px 0;
            border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            vertical-align: middle;
            margin-right: 15px;
            border: 1px solid var(--neon-green);
        }

        .header-title {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            vertical-align: middle;
        }

        .header-title span {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .main-card-container {
            background: var(--card-bg);
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            border: 2px solid rgba(0, 255, 65, 0.3);
        }

        h1 {
            text-align: center;
            color: var(--neon-green);
            margin-bottom: 25px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gray);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        button.btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00cc33, #00aa2b, #008822);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0, 204, 51, 0.3);
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 204, 51, 0.5);
        }

        .gestoes-lista {
            margin-top: 40px;
        }

        .gestao-item {
            background: rgba(0, 255, 65, 0.05);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .gestao-item:hover {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--neon-green);
        }

        .gestao-info span {
            font-weight: bold;
            font-size: 18px;
            color: var(--text-light);
        }

        .btns {
            display: flex;
            gap: 10px;
        }

        .btns button {
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-abrir {
            background: var(--neon-green);
            color: #000;
        }

        .btn-excluir {
            background: #ff4444;
            color: white;
        }

        .btn-voltar {
            display: inline-block;
            margin: 20px 0;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .btn-voltar:hover {
            color: var(--neon-green);
        }

        /* Footer Styles Refined */
        .footer {
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1419 100%);
            padding: 40px 0 20px;
            border-top: 1px solid rgba(0, 255, 65, 0.1);
            color: var(--text-gray);
            margin-top: 60px;
        }

        .footer .container-footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: nowrap !important;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            flex: 0 0 auto;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        .footer-logo h1 {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            text-transform: none;
            word-break: keep-all;
        }

        .footer-logo h1 span {
            color: #39ff14;
        }

        .footer-seals {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .seal-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .seal-badge-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .seal-18 {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #595050, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            border: 1.5px solid #fff;
        }

        .seal-badge-text {
            font-size: 0.65rem;
            color: #9ca3af;
            line-height: 1.2;
        }

        .seal-badge-text strong {
            color: #fff;
            display: block;
            font-size: 0.7rem;
        }

        .payment-img {
            height: 75px;
            width: auto;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .payment-img:hover {
            opacity: 1;
        }

        .footer-social {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            flex: 0 0 auto;
        }

        .social-link {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #9ca3af;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link:hover {
            background: rgba(0, 255, 65, 0.1);
            border-color: rgba(0, 255, 65, 0.3);
            color: #00ff41;
            transform: translateY(-2px);
        }

        .footer-bottom {
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .footer-copyright-main {
            color: #6b7280;
            font-size: 0.8rem;
            margin: 0;
        }

        /* Media query content removed to prevent stacking */
        @media (max-width: 1024px) {
            .footer-content {
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 20px;
            }

            .footer-logo h1 {
                font-size: 1.2rem;
            }

            .seal-badge {
                padding: 6px 12px;
            }
        }
    </style>
</head>

<body>
    <header class="header-custom">
        <div class="container-header">
            <img src="icon.png" alt="Rei dos Bots" class="logo-img">
            <div class="header-title">Rei dos Bots - <span>Fortuna</span></div>
        </div>
    </header>

    <div class="main-card-container">
        <h1>📊 Gestão de Banca</h1>

        <div class="form-group">
            <label for="nome">Nome da Estratégia</label>
            <input type="text" id="nome" placeholder="Ex: Alavancagem Março">
        </div>

        <div class="form-group">
            <label for="valor">Banca Inicial (R$)</label>
            <input type="number" id="valor" placeholder="0.00">
        </div>

        <div class="form-group">
            <label for="percentual">Meta Diária (%)</label>
            <input type="number" id="percentual" placeholder="Ex: 3">
        </div>

        <div class="form-group">
            <label for="dias">Prazo (Dias)</label>
            <input type="number" id="dias" placeholder="Ex: 30">
        </div>

        <button class="btn-primary" onclick="criarGestao()">🚀 Criar Nova Gestão</button>

        <div id="gestoes" class="gestoes-lista"></div>

        <div style="text-align: center;">
            <a href="index.html" class="btn-voltar">← Voltar para o Início</a>
        </div>
    </div>

    <!-- Footer -->

                    </div>
                    <div class="seal-badge">
                        <div class="seal-badge-icon">✓</div>
                        <div class="seal-badge-text">Verificado por<br><strong>ConfiançaAQUI</strong></div>
                    </div>
                    <div class="seal-badge">
                        <div class="seal-badge-icon">🛡️</div>
                        <div class="seal-badge-text">Autêntico<br><strong>cert.iob.cw</strong></div>
                    </div>
                    <img src="pix-banco-central-logo.png" alt="PIX" class="payment-img">
                    <img src="mercado-livre-logo-2022.png" alt="Mercado Pago" class="payment-img">
                    <img src="infinitypay.png" alt="InfinitePay" class="payment-img">
                </div>

                <!-- Social Links -->

                </div>
            </div>

            <!-- Footer Bottom -->
            <div class="footer-bottom">
                <p class="footer-copyright">© 2026 Rei dos Bots - Fortuna. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        let gestoes = [];

        function salvarLocalStorage() {
            localStorage.setItem('gestoesSalvas', JSON.stringify(gestoes));
        }

        function carregarLocalStorage() {
            const dados = localStorage.getItem('gestoesSalvas');
            if (dados) {
                gestoes = JSON.parse(dados);
                atualizarLista();
            }
        }

        function criarGestao() {
            const nome = document.getElementById('nome').value;
            const valor = document.getElementById('valor').value;
            const percentual = document.getElementById('percentual').value;
            const dias = document.getElementById('dias').value;

            if (!nome || !valor || !percentual || !dias) {
                alert('Por favor, preencha todos os campos!');
                return;
            }

            const id = Date.now();
            gestoes.push({ id, nome, valor, percentual, dias });
            salvarLocalStorage();
            atualizarLista();
            limparCampos();
        }

        function atualizarLista() {
            const container = document.getElementById('gestoes');
            container.innerHTML = '';

            if (gestoes.length > 0) {
                const title = document.createElement('h3');
                title.style.color = '#fff';
                title.style.marginBottom = '15px';
                title.textContent = 'Minhas Gestões:';
                container.appendChild(title);
            }

            gestoes.forEach(g => {
                const div = document.createElement('div');
                div.className = 'gestao-item';
                div.innerHTML = `
                    <div class="gestao-info">
                        <span>${g.nome}</span>
                        <div style="font-size: 12px; color: #b0b0b0;">Meta: ${g.percentual}% ao dia</div>
                    </div>
                    <div class="btns">
                        <button class="btn-abrir" onclick="abrirGestao(${g.id})">Abrir</button>
                        <button class="btn-excluir" onclick="excluirGestao(${g.id})">Excluir</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function excluirGestao(id) {
            if (confirm('Deseja realmente excluir esta gestão?')) {
                gestoes = gestoes.filter(g => g.id !== id);
                salvarLocalStorage();
                atualizarLista();
            }
        }

        function abrirGestao(id) {
            const gestao = gestoes.find(g => g.id === id);
            if (gestao) {
                localStorage.setItem('gestaoSelecionada', JSON.stringify(gestao));
                window.location.href = 'gestao.html';
            }
        }

        function limparCampos() {
            document.getElementById('nome').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('percentual').value = '';
            document.getElementById('dias').value = '';
        }

        carregarLocalStorage();
    </script>
</body>

</html>
