<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rei dos Bots — Login Mobile</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .screen { width: 100%; max-width: 400px; padding: 20px; }
  .card { background: #1a1a2e; border: 1px solid #333; border-radius: 14px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .logo { text-align: center; margin-bottom: 25px; }
  .logo h1 { color: #FFD700; font-size: 24px; letter-spacing: 1px; }
  .logo p { color: #888; font-size: 14px; margin-top: 5px; }
  label { display: block; font-size: 12px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
  input { width: 100%; padding: 14px; background: #0f0f1a; border: 1px solid #333; border-radius: 10px; color: white; font-size: 16px; margin-bottom: 20px; transition: border-color 0.3s; }
  input:focus { outline: none; border-color: #FFD700; }
  .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #FFD700, #b8860b); color: #000; transition: transform 0.2s; }
  .btn:active { transform: scale(0.98); }
  .msg { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; text-align: center; }
  .msg-err { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; }
  .msg-ok { background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #22c55e; }
</style>
</head>
<body>

<div class="screen">
  <div class="card">
    <div class="logo">
      <h1>🤖 REI DOS BOTS</h1>
      <p>Acesso Mobile</p>
    </div>
    
    <div class="msg msg-err" id="msgErr"></div>
    <div class="msg msg-ok" id="msgOk"></div>
    
    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    
    <button class="btn" onclick="fazerLogin()">ENTRAR NO PAINEL</button>
  </div>
</div>

<script>
// URL do servidor Render
const API = 'https://fortuna-x-web.onrender.com/api';

async function fazerLogin() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const msgErr = document.getElementById('msgErr');
  const msgOk = document.getElementById('msgOk');
  
  msgErr.style.display = 'none';
  msgOk.style.display = 'none';
  
  if (!email || !senha) {
    msgErr.textContent = 'Preencha todos os campos';
    msgErr.style.display = 'block';
    return;
  }
  
  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    
    const data = await res.json();
    
    if (!res.ok || data.erro) {
      msgErr.textContent = data.erro || 'Erro ao fazer login';
      msgErr.style.display = 'block';
      return;
    }
    
    // Login OK
    localStorage.setItem('rdb_email', email);
    msgOk.textContent = '✅ Login realizado! Redirecionando...';
    msgOk.style.display = 'block';
    
    setTimeout(() => {
      // Redireciona para o index.html (que é o painel completo)
      window.location.href = 'index.html';
    }, 1000);
    
  } catch (e) {
    msgErr.textContent = 'Erro ao conectar com o servidor.';
    msgErr.style.display = 'block';
  }
}

// Permitir Enter
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') fazerLogin();
});
</script>
</body>
</html>
